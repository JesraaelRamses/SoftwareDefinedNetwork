version: '3.8'

services:
  postgres:
    image: docker.io/library/postgres:15
    container_name: awx-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - awx-net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awx"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7
    container_name: awx-redis
    networks:
      - awx-net
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  awx-web:
    image: quay.io/ansible/awx:23.0.0
    container_name: awx-web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AWX_RECEPTOR_ENABLED: "false"
      AWX_CELERY_BROKER_URL: "redis://redis:6379/0"
      AWX_CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    ports:
      - "8080:8052"
    volumes:
      - ./projects:/var/lib/awx/projects:Z
      - ./entrypoint-web.sh:/entrypoint.sh:Z
    networks:
      - awx-net
    command: /entrypoint.sh
    restart: always

  awx-task:
    image: quay.io/ansible/awx:23.0.0
    container_name: awx-task
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      AWX_RECEPTOR_ENABLED: "false"
      AWX_CELERY_BROKER_URL: "redis://redis:6379/0"
      AWX_CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    volumes:
      - ./projects:/var/lib/awx/projects:Z
    networks:
      - awx-net
    command: awx-manage run_dispatcher
    restart: always

networks:
  awx-net:
    driver: bridge